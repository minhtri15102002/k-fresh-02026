name: Auto Generate PR Report

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

env:
    ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    NODE_VERSION: 24

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Check Checkout Node version
        run: node -v

      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Get PR Commits
        id: get_commits
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          # Get commits and format them as a markdown list
          COMMITS=$(git log origin/${{ github.event.pull_request.base.ref }}..HEAD --pretty=format:"* %h - %s (%an)" --no-merges)
          
          # Use GITHUB_ENV to pass multiline string
          echo "PR_COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Generate PR Report from Template
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          PR_COMMITS: ${{ env.PR_COMMITS }}
        run: |
          envsubst < .github/templates/report-template.md > PR_REPORT.md

      - name: Upload PR Report
        uses: actions/upload-artifact@v5
        with:
          name: pr-report
          path: PR_REPORT.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
