name: Auto Generate PR Report

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]
jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate PR Report
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          echo "# Pull Request Report" > PR_REPORT.md
          echo "" >> PR_REPORT.md
          echo "## 1. PR Summary" >> PR_REPORT.md
          echo "- **Title:** $PR_TITLE" >> PR_REPORT.md
          echo "- **Author:** $PR_AUTHOR" >> PR_REPORT.md
          echo "- **Source Branch:** $PR_BRANCH → **Target Branch:** $BASE_BRANCH" >> PR_REPORT.md
          echo "" >> PR_REPORT.md
          echo "## 2. PR Description" >> PR_REPORT.md
          echo "$PR_BODY" >> PR_REPORT.md
          echo "" >> PR_REPORT.md
          echo "## 3. Files Changed" >> PR_REPORT.md
          echo "- Total files changed: **$PR_CHANGED_FILES**" >> PR_REPORT.md
          echo "" >> PR_REPORT.md
          echo "## 4. Auto Notes" >> PR_REPORT.md
          echo "- This PR report was automatically generated by GitHub Actions." >> PR_REPORT.md

      - name: Upload PR Report
        uses: actions/upload-artifact@v3
        with:
          name: pr-report
          path: PR_REPORT.md

      - name: Comment PR
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ## 📄 PR Report Generated Successfully
            Download file: **PR_REPORT.md** (Artifact)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}