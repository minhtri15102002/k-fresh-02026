name: Auto Generate PR Report

on:
  workflow_run:
    workflows: ["Playwright Tests"]   
    types: [completed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24

jobs:
  generate-report:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download PR Number Artifact
        uses: actions/download-artifact@v4
        with:
          name: pr_number
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read PR Number
        id: pr_num
        run: echo "nr=$(cat pr_number.txt)" >> $GITHUB_OUTPUT

      - name: Download Playwright Results
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Playwright Summary
        id: test_summary
        run: |
          if [ -f playwright-report/summary.json ]; then
            SUMMARY=$(cat playwright-report/summary.json)
            echo "TEST_SUMMARY<<EOF" >> $GITHUB_ENV
            echo "$SUMMARY" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "TEST_SUMMARY=No summary data available" >> $GITHUB_ENV
          fi

      - name: Get PR Info
        id: pr_info
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ steps.pr_num.outputs.nr }}
            });
            core.setOutput('title', pr.data.title);
            core.setOutput('body', pr.data.body || '');
            core.setOutput('author', pr.data.user.login);
            core.setOutput('head_ref', pr.data.head.ref);
            core.setOutput('base_ref', pr.data.base.ref);
            core.setOutput('changed_files', pr.data.changed_files);

      - name: Get PR Commits
        id: get_commits
        run: |
          git fetch origin ${{ steps.pr_info.outputs.base_ref }}
          # Get commits and format them as a markdown list
          COMMITS=$(git log origin/${{ steps.pr_info.outputs.base_ref }}..HEAD --pretty=format:"* %h - %s (%an)" --no-merges)
          
          echo "PR_COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Generate PR Report from Template
        env:
          PR_TITLE: ${{ steps.pr_info.outputs.title }}
          PR_BODY: ${{ steps.pr_info.outputs.body }}
          PR_AUTHOR: ${{ steps.pr_info.outputs.author }}
          PR_BRANCH: ${{ steps.pr_info.outputs.head_ref }}
          BASE_BRANCH: ${{ steps.pr_info.outputs.base_ref }}
          PR_CHANGED_FILES: ${{ steps.pr_info.outputs.changed_files }}
          PR_COMMITS: ${{ env.PR_COMMITS }}
          TEST_SUMMARY: ${{ env.TEST_SUMMARY }}
        run: |
          # Use envsubst to replace variables in template
          # Make sure dependencies are installed if not in runner
          envsubst < .github/templates/report-template.md > PR_REPORT.md

      - name: Comment PR Report
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: PR_REPORT.md
          number: ${{ steps.pr_num.outputs.nr }}

      - name: Upload PR Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-report
          path: PR_REPORT.md
