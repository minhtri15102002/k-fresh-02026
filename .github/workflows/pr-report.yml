name: Auto Generate PR Report

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write
  issues: write   # 🔥 BẮT BUỘC để comment PR

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download Playwright Results
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Extract Playwright Summary
        run: |
          if [ -f playwright-report/summary.json ]; then
            echo "TEST_SUMMARY<<EOF" >> $GITHUB_ENV
            cat playwright-report/summary.json >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "TEST_SUMMARY=No summary data available" >> $GITHUB_ENV
          fi

      - name: Get PR Commits
        run: |
          git fetch origin ${{ github.ref_name }}

          COMMITS=$(git log origin/${{ github.ref_name }}..HEAD --pretty=format:"* %h - %s (%an)" --no-merges)

          echo "PR_COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Generate PR Report from Template
        env:
          PR_TITLE: ${{ github.event.pull_request.title || github.ref_name }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login || 'unknown' }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref || 'main' }}
          PR_CHANGED_FILES: ${{ github.event.pull_request.changed_files || 'N/A' }}
          PR_COMMITS: ${{ env.PR_COMMITS }}
          TEST_SUMMARY: ${{ env.TEST_SUMMARY }}
        run: |
          envsubst < .github/templates/report-template.md > PR_REPORT.md

      - name: Comment PR Report
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: PR_REPORT.md
          number: ${{ github.event.pull_request.number }}

      - name: Upload PR Report Artifact
        uses: actions/upload-artifact@v6
        with:
          name: pr-report
          path: PR_REPORT.md