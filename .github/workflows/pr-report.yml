name: Auto Generate PR Report

on:
  workflow_run:
    workflows: ["Playwright Tests"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24

jobs:
  generate-report:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext

      # ✅ FIX: download artifact từ đúng workflow_run
      - name: Download Playwright results
        uses: actions/download-artifact@v4
        with:
          name: playwright-results
          path: test-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ⚠️ Fail-safe nếu không có file
      - name: Check summary file
        run: |
          ls -R test-results
          test -f test-results/summary.json || (echo "Missing summary.json" && exit 1)

      - name: Extract Playwright Summary
        run: |
          SUMMARY=$(cat test-results/summary.json)

          echo "TEST_SUMMARY<<EOF" >> $GITHUB_ENV
          echo "$SUMMARY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # ✅ Lấy PR number đúng cách
      - name: Get PR number
        run: |
          echo "PR_NUMBER=${{ github.event.workflow_run.pull_requests[0].number }}" >> $GITHUB_ENV

      - name: Get PR Commits
        run: |
          git fetch origin ${{ github.event.workflow_run.head_branch }}

          COMMITS=$(git log origin/${{ github.event.workflow_run.head_branch }}..HEAD \
            --pretty=format:"* %h - %s (%an)" --no-merges)

          echo "PR_COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Generate PR Report from Template
        run: |
          envsubst < .github/templates/report-template.md > PR_REPORT.md

      # ✅ FIX sticky comment (không bị mất PR number)
      - name: Comment PR Report
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          number: ${{ env.PR_NUMBER }}
          path: PR_REPORT.md

      - name: Upload PR Report
        uses: actions/upload-artifact@v6
        with:
          name: pr-report
          path: PR_REPORT.md