name: Auto Generate PR Report

on:
  workflow_run:
    workflows: ["Playwright Tests"]   
    types: [completed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24

jobs:
  generate-report:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext

      # ⬇️ Download Playwright result artifact
      - name: Download Playwright results
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      # ⬇️ Đọc file summary.json (hoặc file bạn export)
      - name: Extract Playwright Summary
        id: test_summary
        run: |
          if [ -f playwright-report/summary.json ]; then
            SUMMARY=$(cat playwright-report/summary.json)
            echo "TEST_SUMMARY<<EOF" >> $GITHUB_ENV
            echo "$SUMMARY" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "TEST_SUMMARY=No summary data available" >> $GITHUB_ENV
          fi

      # ⬇️ Lấy lại metadata của Pull Request
      - name: Get PR Info
        id: pr
        uses: juturu/cloud-run-event-parser@v1

      - name: Get PR Commits
        run: |
          git fetch origin ${{ steps.pr.outputs.pull_request_base_ref }}
          COMMITS=$(git log origin/${{ steps.pr.outputs.pull_request_base_ref }}..HEAD \
            --pretty=format:"* %h - %s (%an)" --no-merges)

          echo "PR_COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Generate PR Report from Template
        env:
          PR_TITLE: ${{ steps.pr.outputs.pull_request_title }}
          PR_BODY: ${{ steps.pr.outputs.pull_request_body }}
          PR_AUTHOR: ${{ steps.pr.outputs.pull_request_user_login }}
          PR_BRANCH: ${{ steps.pr.outputs.pull_request_head_ref }}
          BASE_BRANCH: ${{ steps.pr.outputs.pull_request_base_ref }}
          PR_CHANGED_FILES: ${{ steps.pr.outputs.pull_request_changed_files }}
          PR_COMMITS: ${{ env.PR_COMMITS }}
          TEST_SUMMARY: ${{ env.TEST_SUMMARY }}
        run: |
          envsubst < .github/templates/report-template.md > PR_REPORT.md

      - name: Comment PR Report
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: PR_REPORT.md
          number: ${{ steps.pr.outputs.pull_request_number }}

      - name: Upload PR Report
        uses: actions/upload-artifact@v6
        with:
          name: pr-report
          path: PR_REPORT.md