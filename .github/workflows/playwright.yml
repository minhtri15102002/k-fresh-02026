
name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: qa
        type: choice
        options:
          - qa
          - staging
          - uat
          - production
          - all
      
      browser:
        description: 'Browser to run tests in'
        required: true
        default: 'chromium'
        type: choice
        options:
          - 'chromium'
          - 'firefox'
          - 'webkit'
          - 'Mobile Chrome'
          - 'Mobile Safari'
      
      test_type:
        description: 'Type of test suite'
        required: true
        default: all
        type: choice
        options:
          - smoke
          - regression
          - all
      
      spec_file:
        description: 'Specific spec file to run (optional, e.g., tests/ui/login.spec.ts)'
        required: false
        default: ''
        type: string

jobs:
  test:
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJson((github.event_name == 'workflow_dispatch' && github.event.inputs.environment != 'all') && format('["{0}"]', github.event.inputs.environment) || '["qa","staging","uat"]') }}
        
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Install Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    - name: Install Allure
      run: npm install -g allure
    - name: Run Playwright tests
      run: |
        echo "Running tests against environment: $ENV"
        echo "Running test type: $TEST_TYPE"
        echo "Browser: $BROWSER"
        echo "Spec file: $SPEC_FILE"

        if [ -n "$SPEC_FILE" ] && [ "$SPEC_FILE" != "" ]; then
          echo "Running specific spec file: $SPEC_FILE"
          npx playwright test "$SPEC_FILE" --project="$BROWSER"
        elif [ "$TEST_TYPE" = "all" ]; then
          npx playwright test --project="$BROWSER"
        else
          npx playwright test --grep "@$TEST_TYPE" --project="$BROWSER"
        fi
      env:
        HEADLESS: true
        CI: true
        ENV: ${{ matrix.env }}
        BROWSER: ${{ github.event.inputs.browser || 'Desktop Chrome' }}
        TEST_TYPE: ${{ github.event.inputs.test_type || 'all' }}
        SPEC_FILE: ${{ github.event.inputs.spec_file || '' }}
    - uses: actions/upload-artifact@v5
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 10
    
    - name: Generate Allure Report
      if: ${{ !cancelled() }}
      run: npm run allure-report
    
    - uses: actions/upload-artifact@v5
      if: ${{ !cancelled() }}
      with:
        name: Upload Allure Report
        path: playwright-report/
        retention-days: 10

