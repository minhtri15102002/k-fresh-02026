
name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: all
        type: choice
        options:
          - qa
          - staging
          - uat
          - production
          - all

jobs:
  test:
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        env: [qa, staging, uat, production]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.environment == 'all' || github.event.inputs.environment == matrix.env }}
      run: |
        echo "Running tests against environment: $ENV"
        npx playwright test
      env:
        HEADLESS: true
        CI: true
        ENV: ${{ matrix.env }}
    - uses: actions/upload-artifact@v5
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30