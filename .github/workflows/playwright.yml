
name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: all
        type: choice
        options:
          - qa
          - staging
          - uat
          - production
          - all
      test_suite:
        description: 'Select test suite to run'
        required: true
        default: cart
        type: choice
        options:
          - all
          - cart
          - checkout
          - login
          - product
          - home
          - profile
          - register
          - address-book
          - compare
          - wish-list
          - e2e
          - my-orders
      grep:
        description: 'Test name to run (regex)'
        required: false
        default: ''
      test_file:
        description: 'Specific test file to run (optional)'
        required: false
        default: ''

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        env: [qa, staging, uat, production]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.environment == 'all' || github.event.inputs.environment == matrix.env }}
      run: |
        echo "Running tests against environment: $ENV"
        
        # Determine test target based on suite selection
        TEST_TARGET="${TEST_FILE}"
        if [ "$TEST_SUITE" != "all" ] && [ -z "$TEST_FILE" ]; then
          case $TEST_SUITE in
            cart) TEST_TARGET="tests/ui/test-cart.spec.ts" ;;
            checkout) TEST_TARGET="tests/ui/test-checkout.spec.ts" ;;
            login) TEST_TARGET="tests/ui/test-login.spec.ts" ;;
            product) TEST_TARGET="tests/ui/test-product.spec.ts" ;;
            home) TEST_TARGET="tests/ui/test-home.spec.ts" ;;
            profile) TEST_TARGET="tests/ui/test-profile.spec.ts" ;;
            register) TEST_TARGET="tests/ui/test-register.spec.ts" ;;
            address-book) TEST_TARGET="tests/ui/test-address-book.spec.ts" ;;
            compare) TEST_TARGET="tests/ui/test-compare-products.spec.ts" ;;
            wish-list) TEST_TARGET="tests/ui/test-wish-list.spec.ts" ;;
            e2e) TEST_TARGET="tests/ui/test-e2e.spec.ts" ;;
            my-orders) TEST_TARGET="tests/ui/test-my-orders.spec.ts" ;;
          esac
        fi
        
        echo "Executing: npx playwright test $TEST_TARGET ${GREP:+ -g \"$GREP\"}"
        npx playwright test $TEST_TARGET ${GREP:+ -g "$GREP"}
      env:
        HEADLESS: true
        CI: true
        ENV: ${{ matrix.env }}
        TEST_SUITE: ${{ github.event.inputs.test_suite || 'product' }}
        GREP: ${{ github.event.inputs.grep }}
        TEST_FILE: ${{ github.event.inputs.test_file }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Save PR number
      if: github.event_name == 'pull_request'
      run: echo ${{ github.event.number }} > pr_number.txt

    - name: Upload PR number
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: pr_number
        path: pr_number.txt

  report:
    needs: test
    if: always() && github.event_name == 'pull_request'
    uses: ./.github/workflows/pr-report.yml
    secrets: inherit
